version: "3.8"

services:
  web:
    build: .
    ports:
      - "5001:5001"
    environment:
      - SECRET_KEY=your-secret-key-here
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5001
    depends_on:
      - redis
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # Persist data to disk so blocked IPs survive container restarts
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data: