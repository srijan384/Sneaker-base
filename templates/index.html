<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sneaker Base | Premium Sneakers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/style.css">

    <style>
        .fav-btn {
            position: absolute; top: 10px; right: 10px; background: white;
            border: none; border-radius: 50%; width: 35px; height: 35px;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .fav-btn i { color: #ccc; font-size: 18px; transition: 0.2s; }
        .fav-btn.active i { color: red; }
        .product {
            position: relative; background: white; padding: 15px;
            border-radius: 10px; text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .product:hover { transform: translateY(-5px); }
        .product img { width: 100%; border-radius: 10px; }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; background-color: white;
            min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1;
        }
        .dropdown-content a { color: black; padding: 12px 16px; text-decoration: none; display: block; }
        .dropdown:hover .dropdown-content { display: block; }
    </style>
</head>
<body>

<!-- BOT DETECT: load first -->
<script src="{{ url_for('static', filename='js/bot_detect.js') }}"></script>

<!-- Honeypot links invisible to humans -->
<a href="/trap/exclusive-access"
   style="position:absolute;left:-9999px;top:-9999px;width:0;height:0;overflow:hidden;opacity:0;"
   tabindex="-1" aria-hidden="true">exclusive</a>
<a href="/api/v1/priority-access"
   style="position:absolute;left:-9999px;top:-9999px;width:0;height:0;overflow:hidden;opacity:0;"
   tabindex="-1" aria-hidden="true">priority-api</a>

<header class="header">
    <div class="logo">
        <img src="/static/assets/images/logo.png" alt="Sneaker Base">
    </div>
    <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/products?category=unisex">Unisex</a>
        <a href="/products?category=new">New In</a>
        <div class="dropdown">
            <a href="#" style="cursor: pointer;">Brands ▾</a>
            <div class="dropdown-content">
                <a href="/products?brand=Jordan">Air Jordan</a>
                <a href="/products?brand=Nike">Nike</a>
                <a href="/products?brand=Adidas">Adidas</a>
                <a href="/products?brand=Yeezy">Yeezy</a>
                <a href="/products">All Brands</a>
            </div>
        </div>
    </nav>
    <div class="icons" style="display: flex; align-items: center; gap: 20px;">
        <a href="/wishlist" title="My Wishlist" style="color: black; text-decoration: none;">
            <i class="fa fa-heart-o fa-2x"></i>
        </a>
        <a href="/cart" style="color: black; text-decoration: none;">
            <i class="fa fa-shopping-cart fa-2x"></i>
            {% if cart_count and cart_count > 0 %}
            <span id="cart-count" style="background: black; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; vertical-align: top;">{{ cart_count }}</span>
            {% endif %}
        </a>
    </div>
</header>

<section class="hero">
    <h1>Premium Sneakers</h1>
    <p>Limited Edition • Streetwear • Authentic</p>
    <!--
        Shop Now button: bots get redirected to /products/exclusive (fake page),
        real users go to /products. The server sets bot_flagged via Jinja.
    -->
    <button class="shop" id="shop-btn"
            onclick="handleShopNow()">Shop Now</button>
</section>

<section class="products">
    <h2>Popular Sneakers</h2>
    <div class="product-grid" id="product-grid"></div>
</section>

<footer>
    <p>© 2026 Sneaker Base. All Rights Reserved.</p>
    <a href="/api/v1/priority-access" style="display:none;">Admin API Access</a>
</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<script>
    // ── Shop Now: server already knows if this IP is a bot ──────
    // bot_flagged is injected by Flask via Jinja
  

    function handleShopNow() {
        window.location.href = '/products';
    }

    // If bot_detect.js gets a redirect response from server, update button
    

    // ── Also: if client-side bot score crosses threshold, update ─
    // bot_detect.js sends score to /api/bot_signal which returns
    // { redirect: true } — intercept and reroute Shop Now
    const _origFetch = window.fetch;
    window.fetch = function(...args) {
        return _origFetch.apply(this, args).then(res => {
            // Clone so we can still return original response
            const clone = res.clone();
            if (typeof args[0] === 'string' && args[0].includes('/api/bot_signal')) {
                clone.json().then(data => {
                    if (data && data.flagged) {
                        // Update the button target dynamically
                        const btn = document.getElementById('shop-btn');
                        if (btn) {
                            btn.onclick = () => { window.location.href = '/products/exclusive'; };
                        }
                    }
                }).catch(() => {});
            }
            return res;
        });
    };
</script>

<script>
    function toggleHeart(btn, name, price, image) {
        btn.classList.toggle("active");
        let icon = btn.querySelector("i");
        icon.style.color = btn.classList.contains("active") ? "red" : "#ccc";
        fetch('/api/toggle_wishlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, price, image })
        }).then(r => r.json()).then(d => console.log("Wishlist:", d.count))
          .catch(e => console.error(e));
    }
</script>

<script>
async function loadSneakers() {
    try {
        const res  = await fetch("/api/sneakers");
        if (!res.ok) throw new Error("API " + res.status);
        const data = await res.json();
        const grid = document.getElementById("product-grid");
        if (!grid) return;
        grid.innerHTML = "";
        data.forEach(shoe => {
            grid.innerHTML += `
            <div class="product">
                <button class="fav-btn" onclick="toggleHeart(this,'${shoe.name}','${shoe.price}','${shoe.image}')">
                    <i class="fa fa-heart"></i>
                </button>
                <a href="/products" style="text-decoration:none;color:inherit;">
                    <img src="${shoe.image}">
                    <h3>${shoe.name}</h3>
                    <p>${shoe.price}</p>
                </a>
            </div>`;
        });
    } catch (err) {
        const grid = document.getElementById("product-grid");
        if (grid) grid.innerHTML = "<p style='color:red'>Failed to load sneakers.</p>";
    }
}
loadSneakers();
</script>
</body>
</html>
