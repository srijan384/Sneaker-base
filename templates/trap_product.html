<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<!-- FAKE SIGNAL 1: title says "Store" not "Shop" -->
<title>{{ product.name }} | Sneaker Base Store</title>

<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<!-- Exact same CSS as product.html -->
<style>

body{ font-family:Arial; background:#f6f6f6; margin:0; }

.header{
display:flex; justify-content:space-between; align-items:center;
padding:15px 40px; background:white; box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.logo img{ height:50px; }
.nav-links a{ margin:0 15px; text-decoration:none; color:black; font-weight:600; }

.product-container{
display:flex; gap:80px; padding:80px; align-items:flex-start;
}

.product-image img{
width:450px; background:white; padding:30px; border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1); transition:transform 0.3s;
}
.product-image img:hover{ transform:scale(1.1); }

.product-info{ max-width:400px; }
.product-info h1{ font-size:30px; margin-bottom:10px; }
.price{ font-size:24px; margin-bottom:10px; }

/* FAKE SIGNAL 2: stock text in red under price */
.stock-text{
font-size:12px; color:#cc0000; font-weight:600;
margin-bottom:20px;
}

/* FAKE SIGNAL 3: sale badge next to name */
.sale-badge{
display:inline-block; background:#cc0000; color:white;
font-size:10px; font-weight:700; padding:3px 8px;
border-radius:3px; letter-spacing:1px;
text-transform:uppercase; margin-left:10px;
vertical-align:middle;
}

.size-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:15px; }
.size-btn{ padding:12px; border:1px solid #ddd; background:white; cursor:pointer; font-weight:600; }
.size-btn:hover{ border:1px solid black; }
.size-btn.active{ background:black; color:white; border:1px solid black; }
.size-btn.disabled{ background:#eee; color:#999; cursor:not-allowed; }

.btn{ width:100%; padding:14px; border:none; cursor:pointer; margin-bottom:10px; font-weight:bold; }
.cart-btn{ background:black; color:white; }
.wishlist-btn{ background:white; border:1px solid black; }

.size-modal{
display:none; position:fixed; z-index:1000; left:0; top:0;
width:100%; height:100%; background:rgba(0,0,0,0.5);
}
.size-modal-content{
background:white; padding:30px; width:420px;
margin:120px auto; border-radius:10px; text-align:center;
}
.size-modal table{ width:100%; border-collapse:collapse; margin-top:20px; }
.size-modal th, .size-modal td{ border:1px solid #ddd; padding:10px; }
.close{ float:right; cursor:pointer; font-size:22px; }

.product-grid{ display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
.product{
background:white; padding:20px; border-radius:10px;
width:220px; text-align:center; box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.product img{ width:100%; height:160px; object-fit:contain; }

/* FAKE SIGNAL 2: tiny red dot on logo */
.fake-dot{
display:inline-block; width:7px; height:7px;
background:red; border-radius:50%;
vertical-align:top; margin-top:6px; margin-left:3px;
}

</style>

</head>
<body>

<!-- Honeypot hidden links — invisible to humans, bots follow -->
<div style="display:none;">
  <a href="/trap/exclusive-access">Exclusive API Access</a>
  <a href="/admin/export-users">Admin Export</a>
  <a href="/api/v1/all-products-dump">Full Product Dump</a>
  <input type="text" name="email" id="hp_email" autocomplete="off">
  <input type="text" name="password" id="hp_password" autocomplete="off">
</div>

<header class="header">

<div class="logo">
  <img src="/static/assets/images/logo.png">
  <!-- FAKE SIGNAL 2: tiny red dot only on fake page -->
  <span class="fake-dot"></span>
</div>

<nav class="nav-links">
<a href="/">Home</a>
<a href="/products">Shop</a>
<a href="/wishlist">Wishlist</a>
<a href="/cart">Cart</a>
</nav>

</header>


<div class="product-container">

  <!-- Image — identical layout to product.html -->
  <div class="product-image">
    <img src="{{ product.image }}" alt="{{ product.name }}">
  </div>

  <!-- Info -->
  <div class="product-info">

    <!-- FAKE SIGNAL 3: SALE badge next to name -->
    <h1>
      {{ product.name }}
      <span class="sale-badge">Sale</span>
    </h1>

    <!-- FAKE SIGNAL 4: price ends in .99 -->
    <div class="price">{{ product.display_price }}.99</div>

    <!-- FAKE SIGNAL 5: stock count in red -->
    <div class="stock-text">⚠ Only {{ stock_left }} pairs left!</div>

    <h3>Select Size</h3>

    <div class="size-grid">
      <button class="size-btn" onclick="selectSize(this)">UK 6</button>
      <button class="size-btn" onclick="selectSize(this)">UK 7</button>
      <button class="size-btn disabled">UK 8 (Out)</button>
      <button class="size-btn" onclick="selectSize(this)">UK 9</button>
      <button class="size-btn" onclick="selectSize(this)">UK 10</button>
    </div>

    <p><a href="#" onclick="openSizeChart()">Size Guide</a></p>

    <button class="btn cart-btn" onclick="addToCart('{{ product.name }}','{{ product.display_price }}','{{ product.image }}')">
      Add To Cart
    </button>

    <button class="btn wishlist-btn" onclick="addWishlist('{{ product.name }}','{{ product.display_price }}','{{ product.image }}')">
      Add To Wishlist
    </button>

  </div>
</div>


<!-- You May Also Like — fake recommended products -->
<section style="padding:60px">
<h2>You May Also Like</h2>
<div class="product-grid" id="recommended-grid">
  <!-- filled by JS below -->
</div>
</section>


<!-- Size Chart Modal — identical to product.html -->
<div id="sizeChartModal" class="size-modal">
<div class="size-modal-content">
<span class="close" onclick="closeSizeChart()">×</span>
<h2>Shoe Size Chart</h2>
<table>
<tr><th>UK</th><th>US</th><th>EU</th><th>CM</th></tr>
<tr><td>6</td><td>7</td><td>40</td><td>25</td></tr>
<tr><td>7</td><td>8</td><td>41</td><td>26</td></tr>
<tr><td>8</td><td>9</td><td>42</td><td>27</td></tr>
<tr><td>9</td><td>10</td><td>43</td><td>28</td></tr>
<tr><td>10</td><td>11</td><td>44</td><td>29</td></tr>
</table>
</div>
</div>


<script>

var selectedSize = null;

// ── Size selection — identical to product.html ───────────────────
function selectSize(btn) {
    document.querySelectorAll(".size-btn").forEach(function(b) {
        b.classList.remove("active");
    });
    btn.classList.add("active");
    selectedSize = btn.innerText;
    captureBotAction("size_selected", { size: selectedSize });
}

// ── Add to cart — looks same, logs to trap capture ───────────────
function addToCart(name, price, image) {
    if (!selectedSize) { alert("Please select a size first"); return; }
    captureBotAction("add_to_cart_clicked", { name: name, size: selectedSize });
    fetch("/add_to_cart", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ name: name, price: price, image: image, size: selectedSize })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) { alert("Added to cart"); })
    .catch(function() {});
}

// ── Wishlist — logs to trap capture ─────────────────────────────
function addWishlist(name, price, image) {
    captureBotAction("wishlist_clicked", { name: name });
    fetch("/api/toggle_wishlist", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ name: name, price: price, image: image })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) { alert("Added to wishlist"); })
    .catch(function() {});
}

// ── Size chart modal ─────────────────────────────────────────────
function openSizeChart()  { document.getElementById("sizeChartModal").style.display = "block"; }
function closeSizeChart() { document.getElementById("sizeChartModal").style.display = "none"; }

// ── Load fake recommended sneakers ───────────────────────────────
function loadRecommended() {
    fetch("/api/fake_sneakers?count=4")
        .then(function(res) { return res.json(); })
        .then(function(data) {
            var grid = document.getElementById("recommended-grid");
            data.forEach(function(item) {
                var card       = document.createElement("div");
                card.className = "product";
                card.innerHTML =
                    '<a href="/product/' + item.id + '" style="text-decoration:none;color:inherit;">' +
                        '<img src="' + item.image + '">' +
                        '<h3>' + item.name + '</h3>' +
                        '<p>' + item.display_price + '.99</p>' +
                    '</a>';
                grid.appendChild(card);
            });
        })
        .catch(function() {});
}

loadRecommended();

// ── Bot trap capture ─────────────────────────────────────────────
function captureBotAction(action, data) {
    fetch("/api/bot_trap_capture", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({
            action: action,
            data:   data,
            page:   window.location.pathname,
            ts:     Date.now()
        })
    }).catch(function() {});
}

// ── Monitor honeypot fields ──────────────────────────────────────
["hp_email", "hp_password"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) {
        el.addEventListener("input", function() {
            captureBotAction("honeypot_field_filled", { field: id, value: el.value });
        });
    }
});

</script>

</body>
</html>
