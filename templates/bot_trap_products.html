<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- FAKE SIGNAL 1: Title says "Store" not "Shop" -->
<title>Sneaker Base | Store</title>
 
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
 
<style>
.product-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}
 
.product{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
width:260px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
position:relative;
transition:0.3s;
}
 
.product:hover{
transform:translateY(-8px);
box-shadow:0 12px 28px rgba(0,0,0,0.12);
}
 
.shoe-img{
width:100%;
height:180px;
object-fit:contain;
background:#f7f7f7;
padding:15px;
border-radius:10px;
}
 
.brand-logo{
height:28px;
width:auto;
object-fit:contain;
margin-top:8px;
margin-bottom:8px;
}
 
.dropdown{
position:relative;
display:inline-block;
}
 
.dropdown-content{
display:none;
position:absolute;
background-color:white;
min-width:160px;
box-shadow:0px 8px 16px rgba(0,0,0,0.2);
z-index:1000;
border-radius:5px;
top:100%;
left:0;
}
 
.dropdown-content a{
color:black !important;
padding:12px 16px;
text-decoration:none;
display:block;
text-align:left;
}
 
.dropdown:hover .dropdown-content{
display:block;
}
 
.fav-btn{
position:absolute;
top:10px;
right:10px;
background:white;
border:none;
border-radius:50%;
width:35px;
height:35px;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
display:flex;
align-items:center;
justify-content:center;
z-index:10;
}
 
.fav-btn i{
color:#ccc;
font-size:18px;
transition:0.2s;
}
 
.fav-btn.active i{
color:red;
}
 
.product button{
margin-top:10px;
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
width:100%;
border-radius:5px;
}
 
.product button:hover{
background:#333;
}
 
.load-more-btn{
display:inline-block;
padding:14px 28px;
background:black;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:600;
transition:0.2s;
}
 
.load-more-btn:hover{
background:#333;
}
 
/* ── FAKE SIGNAL 2: Tiny red dot on logo (humans notice, bots don't) ── */
.fake-dot{
display:inline-block;
width:7px;
height:7px;
background:red;
border-radius:50%;
vertical-align:top;
margin-top:6px;
margin-left:3px;
}
 
/* ── FAKE SIGNAL 3: SALE badge on every card ── */
.sale-badge{
position:absolute;
top:10px;
left:10px;
background:#e00;
color:white;
font-size:10px;
font-weight:700;
padding:3px 7px;
border-radius:3px;
letter-spacing:1px;
text-transform:uppercase;
z-index:10;
}
 
/* ── FAKE SIGNAL 4: Stock text under price ── */
.stock-text{
font-size:11px;
color:#e00;
font-weight:600;
margin:2px 0 6px;
}
 
/* ── Skeleton loader ── */
.product.skeleton{ pointer-events:none; }
.skel-img{
width:100%; height:180px; border-radius:10px;
background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
background-size:200% 100%; animation:shimmer 1.4s infinite;
}
.skel-line{
height:14px; border-radius:4px; margin:10px auto;
background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
background-size:200% 100%; animation:shimmer 1.4s infinite;
}
.skel-line.short{ width:55%; }
@keyframes shimmer{
0%  { background-position:200% 0; }
100%{ background-position:-200% 0; }
}
 
#scroll-sentinel{ width:100%; height:1px; }
</style>
</head>
 
<body>
 
<!-- honeytrap links -->
<a href="/trap/exclusive-access"
   style="position:absolute;left:-9999px;top:-9999px;width:0;height:0;overflow:hidden;opacity:0;"
   tabindex="-1" aria-hidden="true">exclusive-access</a>
<a href="/api/v1/all-products-dump"
   style="position:absolute;left:-9999px;top:-9999px;width:0;height:0;overflow:hidden;opacity:0;"
   tabindex="-1" aria-hidden="true">product-dump</a>
 
<header class="header">
 
<div class="logo">
    <img src="/static/assets/images/logo.png" alt="Sneaker Base">
    <!-- FAKE SIGNAL 2: tiny red dot only on fake page -->
    <span class="fake-dot" title="●"></span>
</div>
 
<nav class="nav-links">
<a href="/">Home</a>
<a href="/products?category=unisex">Unisex</a>
<a href="/products?category=new">New In</a>
 
<div class="dropdown">
<a href="#" style="cursor:pointer;">Brands ▾</a>
<div class="dropdown-content">
<a href="/products?brand=Jordan">Air Jordan</a>
<a href="/products?brand=Nike">Nike</a>
<a href="/products?brand=Adidas">Adidas</a>
<a href="/products?brand=Puma">Puma</a>
<a href="/products">All Brands</a>
</div>
</div>
</nav>
 
<div class="icons" style="display:flex;align-items:center;gap:20px;">
<a href="/wishlist" title="My Wishlist" style="color:black;text-decoration:none;">
<i class="fa fa-heart-o fa-2x"></i>
</a>
<a href="/cart" style="color:black;text-decoration:none;">
<i class="fa fa-shopping-cart fa-2x"></i>
<span id="cart-count"
      style="display:none;background:black;color:white;border-radius:50%;padding:2px 6px;font-size:12px;vertical-align:top;">
0
</span>
</a>
</div>
 
</header>
 
 
<section class="products" style="padding-top:20px;">
<div class="product-grid" id="product-grid">
 
{% for item in products %}
<div class="product">
 
    <!-- FAKE SIGNAL 3: SALE badge -->
    <span class="sale-badge">Sale</span>
 
    <button class="fav-btn"
            onclick="toggleHeart(this,'{{ item.name }}','{{ item.display_price }}','{{ item.image }}')">
    <i class="fa fa-heart"></i>
    </button>
 
    <a href="/product/{{ item.id }}" style="text-decoration:none;color:inherit;">
    <img src="{{ item.image }}" class="shoe-img">
    <h3>{{ item.name }}</h3>
    </a>
 
    <!-- FAKE SIGNAL 5: price ends in .99 -->
    <p>{{ item.display_price }}.99</p>
 
    <!-- FAKE SIGNAL 4: stock count -->
    <p class="stock-text">Only {{ item.stock_left }} left!</p>
 
    <button onclick="directAddToCart('{{ item.name }}')">
    Add To Cart
    </button>
 
</div>
{% endfor %}
 
</div>
</section>
 
<div id="scroll-sentinel"></div>

<!-- Load More button — identical style to products.html -->
<div style="text-align:center;margin:40px 0;" id="load-more-wrap">
    <a class="load-more-btn" id="load-more-btn" onclick="loadMore()" style="cursor:pointer;">
        Load More
    </a>
</div>

<div id="loading-indicator" style="text-align:center;margin:30px 0;display:none;">
    <a class="load-more-btn" style="cursor:default;opacity:0.7;">Loading...</a>
</div>
<script>
 
    var loading     = false;
    var totalLoaded = parseInt("{{ products|length }}") || 12;
     
    // ── Build card with all fake signals ────────────────────────────
    function createCard(item) {
        var outer      = document.createElement("div");
        outer.className = "product";
     
        // FAKE SIGNAL 3: SALE badge
        var badge           = document.createElement("span");
        badge.className     = "sale-badge";
        badge.textContent   = "Sale";
     
        // Heart button
        var fav         = document.createElement("button");
        fav.className   = "fav-btn";
        fav.innerHTML   = '<i class="fa fa-heart"></i>';
        fav.onclick     = function() {
            toggleHeart(fav, item.name, item.display_price, item.image);
        };
     
        // Link
        var link        = document.createElement("a");
        link.href       = "/product/" + item.id;
        link.style.cssText = "text-decoration:none;color:inherit;";
     
        var img         = document.createElement("img");
        img.src         = item.image;
        img.className   = "shoe-img";
     
        var h3          = document.createElement("h3");
        h3.textContent  = item.name;
     
        link.appendChild(img);
        link.appendChild(h3);
     
        // FAKE SIGNAL 5: price ends in .99
        var price           = document.createElement("p");
        price.textContent   = item.display_price + ".99";
     
        // FAKE SIGNAL 4: stock count
        var stock           = document.createElement("p");
        stock.className     = "stock-text";
        stock.textContent   = "Only " + item.stock_left + " left!";
     
        // Button
        var btn             = document.createElement("button");
        btn.textContent     = "Add To Cart";
        btn.onclick         = function() { directAddToCart(item.name); };
     
        outer.appendChild(badge);
        outer.appendChild(fav);
        outer.appendChild(link);
        outer.appendChild(price);
        outer.appendChild(stock);
        outer.appendChild(btn);
     
        return outer;
    }
     
    // ── Skeletons ───────────────────────────────────────────────────
    function showSkeletons(n) {
        var grid  = document.getElementById("product-grid");
        var skels = [];
        for (var i = 0; i < n; i++) {
            var s       = document.createElement("div");
            s.className = "product skeleton";
            s.innerHTML =
                '<div class="skel-img"></div>' +
                '<div class="skel-line"></div>' +
                '<div class="skel-line short"></div>' +
                '<div class="skel-line"></div>';
            grid.appendChild(s);
            skels.push(s);
        }
        return skels;
    }
     
    // ── Load more fake sneakers ─────────────────────────────────────
    function loadMore() {
    if (loading) return;
    loading = true;

    var btn = document.getElementById("load-more-btn");
    if (btn) { btn.textContent = "Loading..."; btn.style.opacity = "0.7"; btn.style.cursor = "default"; }

    var skels = showSkeletons(12);

    fetch("/api/fake_sneakers?count=12")
        .then(function(res) {
            if (!res.ok) throw new Error("API error " + res.status);
            return res.json();
        })
        .then(function(data) {
            skels.forEach(function(s) { s.remove(); });
            var grid = document.getElementById("product-grid");
            data.forEach(function(item) {
                grid.appendChild(createCard(item));
            });
            totalLoaded += data.length;
            if (btn) { btn.textContent = "Load More"; btn.style.opacity = "1"; btn.style.cursor = "pointer"; }
            loading = false;
        })
        .catch(function(err) {
            console.error("Load more failed:", err);
            skels.forEach(function(s) { s.remove(); });
            // Don't reset loading on error — stops infinite retry
            if (btn) { btn.textContent = "Try Again"; btn.style.opacity = "1"; btn.style.cursor = "pointer"; }
            loading = false;
        });

}
    // ── Infinite scroll ─────────────────────────────────────────────
    var observer = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting) { loadMore(); }
    }, { rootMargin: "300px" });
     
    observer.observe(document.getElementById("scroll-sentinel"));
     
    // ── Wishlist ────────────────────────────────────────────────────
    function toggleHeart(btn, name, price, image) {
        btn.classList.toggle("active");
        btn.querySelector("i").style.color =
            btn.classList.contains("active") ? "red" : "#ccc";
        fetch("/api/toggle_wishlist", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ name: name, price: price, image: image })
        }).catch(function() {});
    }
     
    // ── Add to cart ─────────────────────────────────────────────────
    function directAddToCart(name) {
        fetch("/add_to_cart", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ name: name, price: "0" })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            var cart = document.getElementById("cart-count");
            if (cart) {
                cart.style.display = "inline";
                cart.innerText     = data.count;
            }
        }).catch(function() {});
    }
     
    </script>
     
    </body>
    </html>
