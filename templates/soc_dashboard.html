
<!DOCTYPE html>
<html>
<head>
<title>SOC Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
margin:0;
font-family:'Fira Code',monospace;
background:#050505;
color:#00ff9c;
}

.top-bar{
display:flex;
justify-content:space-around;
align-items:center;
padding:15px;
border-bottom:2px solid #00ff9c;
}

.metric{text-align:center;}

.metric h1{
margin:0;
font-size:36px;
}

.metric p{
margin:0;
font-size:14px;
color:#9ca3af;
}

.threat{
color:red;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.4;}
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
height:calc(100vh - 80px);
}

.logs{
border-right:1px solid #00ff9c;
padding:15px;
overflow-y:auto;
background:#020202;
}

.log-line{
margin-bottom:6px;
font-size:13px;
}

.traffic{
padding:15px;
}
</style>
</head>

<body>

<div class="top-bar">
<div class="metric">
<h1 id="fakeCount">0</h1>
<p>Fake Records Served</p>
</div>

<div class="metric">
<h1 class="threat" id="threatLevel">LOW</h1>
<p>Threat Level</p>
</div>
</div>

<div class="grid">

<div class="logs" id="logPanel">
<div class="log-line">[SYSTEM] Honeypot initialized...</div>
</div>

<div class="traffic">
<canvas id="trafficChart"></canvas>
</div>

</div>

<script>

/* =========================
   ELEMENT REFERENCES
   ========================= */

const logPanel=document.getElementById("logPanel")
const fakeCountEl=document.getElementById("fakeCount")
const threatEl=document.getElementById("threatLevel")

/* =========================
   CHART SETUP
   ========================= */

const ctx=document.getElementById("trafficChart").getContext("2d")

const trafficData={
labels:[],
datasets:[{
label:"Requests / Second",
data:[],
borderColor:"red",
tension:0.3
}]
}

const trafficChart=new Chart(ctx,{
type:"line",
data:trafficData,
options:{
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{ticks:{color:"#00ff9c"}}
}
}
})

/* =========================
   FETCH REAL STATS
   ========================= */

function fetchStats(){

fetch("/api/stats")
.then(res=>res.json())
.then(data=>{

fakeCountEl.innerText=data.fake_records

if(data.active_bots>0){
threatEl.innerText="HIGH"
}
else{
threatEl.innerText="LOW"
}

const log=document.createElement("div")
log.className="log-line"
log.innerText=`[ALERT] Bot activity detected | Bots: ${data.active_bots} | Fake records served: ${data.fake_records}`

logPanel.appendChild(log)
logPanel.scrollTop=logPanel.scrollHeight

updateTraffic(data.active_bots)

})

}

/* =========================
   UPDATE TRAFFIC GRAPH
   ========================= */

function updateTraffic(bots){

const now=new Date().toLocaleTimeString()

trafficData.labels.push(now)

let traffic=bots*10 + Math.floor(Math.random()*10)

trafficData.datasets[0].data.push(traffic)

if(trafficData.labels.length>15){
trafficData.labels.shift()
trafficData.datasets[0].data.shift()
}

trafficChart.update()

}

/* =========================
   AUTO REFRESH
   ========================= */

setInterval(fetchStats,2000)

fetchStats()

</script>

</body>
</html>
